<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мій Планер</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#f7f9fc">
</head>
<body>
    <header class="top-bar">
        <h1 class="page-title">Мої Завдання</h1>
    </header>

    <div class="app-container">
        <button id="notify-btn" class="notify-btn">🔔 Увімкнути нагадування</button>
        
        <div class="task-card">
            <div class="task-header">
                <h2>💊 Випити ліки</h2>
                <span class="badge">1 раз на день</span>
            </div>
            
            <button id="med-btn" class="action-btn">Я випив(ла) ліки</button>
            
            <div id="timer-display" class="timer-box hidden">
                <p>Наступний прийом через:</p>
                <div id="countdown" class="time">24:00:00</div>
            </div>
            
            <p class="description">Вітаміни або ліки, які потрібно приймати щодня.</p>
        </div>

        <div class="empty-task" onclick="alert('Тут буде меню додавання завдання')">
            <span class="plus-icon">+</span>
            <p>Додати завдання...</p>
        </div>
        <div class="empty-task" onclick="alert('Тут буде меню додавання завдання')">
            <span class="plus-icon">+</span>
            <p>Додати завдання...</p>
        </div>
        <div class="empty-task" onclick="alert('Тут буде меню додавання завдання')">
            <span class="plus-icon">+</span>
            <p>Додати завдання...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active">
            <span class="icon">📋</span>
            <span>Сьогодні</span>
        </div>
        <div class="nav-item" onclick="alert('Розділ в розробці')">
            <span class="icon">📅</span>
            <span>Календар</span>
        </div>
        <div class="nav-item" onclick="alert('Розділ в розробці')">
            <span class="icon">⚙️</span>
            <span>Налаштування</span>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
