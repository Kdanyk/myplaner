<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мій Планер</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#f7f9fc">
</head>
<body>
    <header class="top-bar">
        <h1 class="page-title">Мої Завдання</h1>
    </header>

    <div class="app-container">
        <div id="tasks-container"></div>

        <div class="empty-task" id="open-modal-btn">
            <span class="plus-icon">+</span>
            <p>Створити нове завдання</p>
        </div>
    </div>

    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Створити завдання</h3>
            
            <div class="form-group">
                <label>Назва завдання:</label>
                <input type="text" id="task-title" placeholder="Напр: Випити вітаміни">
            </div>

            <div class="form-group">
                <label>Тип завдання:</label>
                <select id="task-type" onchange="toggleFormFields()">
                    <option value="timer">Таймер (з кнопкою)</option>
                    <option value="text">Текстова закладка (просто інфо)</option>
                </select>
            </div>

            <div id="timer-settings">
                <div class="form-group">
                    <label>Кількість разів на день:</label>
                    <input type="number" id="task-frequency" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Інтервал (у годинах):</label>
                    <input type="number" id="task-interval" value="24" min="1">
                </div>
            </div>

            <div class="form-group hidden" id="text-settings">
                <label>Ваш текст/нотатка:</label>
                <textarea id="task-text" placeholder="Напишіть щось сюди..."></textarea>
            </div>

            <div class="modal-actions">
                <button class="cancel-btn" id="close-modal-btn">Скасувати</button>
                <button class="save-btn" id="save-task-btn">Зберегти</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
