<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мій Планер</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <!-- Нова верхня навігація -->
    <header class="top-bar">
        <button class="left-btn" onclick="alert('Тут можна додати перехід на іншу сторінку')">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h1 class="page-title">Сьогодні</h1>
        <div class="spacer"></div>
    </header>

    <div class="app-container">
        <button id="notify-btn" class="notify-btn">🔔 Увімкнути ранкові нагадування</button>
        
        <div class="task-card">
            <div class="task-header">
                <h2>💊 Ранкові ліки</h2>
                <span class="badge">08:00</span>
            </div>
            <p class="description">Не забудьте випити ліки після сніданку.</p>
            
            <button id="med-btn" class="action-btn">Я випив(ла) ліки</button>
            
            <div id="timer-display" class="timer-box hidden">
                <p>Наступний прийом через:</p>
                <div id="countdown" class="time">24:00:00</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
